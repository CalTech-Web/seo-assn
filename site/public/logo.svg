<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Magnifying glass circle -->
  <circle cx="17" cy="17" r="11" stroke="#0f172a" stroke-width="3" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="25.5" y1="25.5" x2="35" y2="35" stroke="#0f172a" stroke-width="3" stroke-linecap="round"/>
  <!-- Rising bar chart inside the glass -->
  <rect x="10" y="20" width="3.5" height="4" rx="0.75" fill="#f59e0b"/>
  <rect x="15.25" y="16" width="3.5" height="8" rx="0.75" fill="#f59e0b"/>
  <rect x="20.5" y="12" width="3.5" height="12" rx="0.75" fill="#f59e0b"/>
</svg>
