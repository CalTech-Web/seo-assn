<svg viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="400" height="340" fill="url(#bgGrad)" rx="16"/>
  <!-- Bookshelf -->
  <rect x="60" y="240" width="280" height="6" rx="3" fill="#2d3750"/>
  <!-- Book 1 - teal -->
  <g transform="translate(90,120)">
    <rect x="0" y="0" width="35" height="120" rx="3" fill="#1a2133" stroke="#4dbfa8" stroke-width="1.5"/>
    <rect x="5" y="10" width="25" height="4" rx="2" fill="#4dbfa8" opacity="0.5"/>
    <rect x="8" y="20" width="19" height="3" rx="1.5" fill="#4dbfa8" opacity="0.3"/>
    <line x1="5" y1="100" x2="30" y2="100" stroke="#4dbfa8" stroke-width="0.5" opacity="0.3"/>
    <line x1="5" y1="105" x2="30" y2="105" stroke="#4dbfa8" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Book 2 - amber (leaning slightly) -->
  <g transform="translate(132,105)">
    <rect x="0" y="0" width="40" height="135" rx="3" fill="#1e2840" stroke="#f0a500" stroke-width="1.5" transform="rotate(3,20,67)"/>
    <rect x="8" y="15" width="24" height="5" rx="2.5" fill="#f0a500" opacity="0.5" transform="rotate(3,20,67)"/>
    <rect x="10" y="26" width="18" height="3" rx="1.5" fill="#f0a500" opacity="0.3" transform="rotate(3,20,67)"/>
    <circle cx="20" cy="80" r="12" fill="#f0a500" opacity="0.1" transform="rotate(3,20,67)"/>
    <text x="20" y="84" text-anchor="middle" font-size="12" fill="#f0a500" opacity="0.4" font-family="sans-serif" font-weight="bold" transform="rotate(3,20,67)">SEO</text>
  </g>
  <!-- Book 3 - blue -->
  <g transform="translate(180,130)">
    <rect x="0" y="0" width="32" height="110" rx="3" fill="#1a2133" stroke="#6cb4e8" stroke-width="1.5"/>
    <rect x="5" y="10" width="22" height="4" rx="2" fill="#6cb4e8" opacity="0.5"/>
    <rect x="7" y="20" width="16" height="3" rx="1.5" fill="#6cb4e8" opacity="0.3"/>
    <rect x="5" y="85" width="22" height="15" rx="2" fill="#6cb4e8" opacity="0.1"/>
  </g>
  <!-- Book 4 - pink -->
  <g transform="translate(220,140)">
    <rect x="0" y="0" width="30" height="100" rx="3" fill="#1e2840" stroke="#e879a0" stroke-width="1.5"/>
    <rect x="5" y="10" width="20" height="4" rx="2" fill="#e879a0" opacity="0.5"/>
    <rect x="7" y="20" width="14" height="3" rx="1.5" fill="#e879a0" opacity="0.3"/>
  </g>
  <!-- Book 5 - gold (lying flat on top) -->
  <g transform="translate(100,100)">
    <rect x="0" y="0" width="80" height="24" rx="3" fill="#1e2840" stroke="#f5c842" stroke-width="1" transform="rotate(-5,40,12)"/>
    <rect x="10" y="8" width="40" height="4" rx="2" fill="#f5c842" opacity="0.4" transform="rotate(-5,40,12)"/>
  </g>
  <!-- Magnifying glass floating -->
  <g transform="translate(300,100)">
    <circle cx="0" cy="0" r="24" fill="#1e2840" stroke="#f0a500" stroke-width="2" opacity="0.8" filter="url(#glow)"/>
    <circle cx="0" cy="0" r="14" fill="none" stroke="#f0a500" stroke-width="1.5" opacity="0.5"/>
    <line x1="10" y1="10" x2="20" y2="20" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <rect x="-6" y="-3" width="12" height="3" rx="1.5" fill="#f0a500" opacity="0.3"/>
  </g>
  <!-- Graduation cap floating -->
  <g transform="translate(310,200)">
    <polygon points="0,-12 20,0 0,6 -20,0" fill="#4dbfa8" opacity="0.6"/>
    <line x1="0" y1="6" x2="0" y2="16" stroke="#4dbfa8" stroke-width="1" opacity="0.4"/>
    <rect x="-10" y="6" width="20" height="3" rx="1.5" fill="#4dbfa8" opacity="0.3"/>
  </g>
  <!-- Bottom label -->
  <rect x="110" y="265" width="180" height="28" rx="14" fill="#1e2840" stroke="#f0a500" stroke-width="1.5"/>
  <rect x="128" y="275" width="50" height="6" rx="3" fill="#f0a500" opacity="0.5"/>
  <rect x="184" y="275" width="35" height="6" rx="3" fill="#4dbfa8" opacity="0.4"/>
  <rect x="225" y="275" width="45" height="6" rx="3" fill="#6cb4e8" opacity="0.3"/>
  <!-- Sparkles -->
  <circle cx="55" cy="80" r="2" fill="#f0a500" opacity="0.5" filter="url(#glow)"/>
  <circle cx="360" cy="260" r="1.5" fill="#4dbfa8" opacity="0.5" filter="url(#glow)"/>
  <circle cx="270" cy="60" r="1.5" fill="#f5c842" opacity="0.4" filter="url(#glow)"/>
</svg>