<svg viewBox="0 0 540 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0a500"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
    <linearGradient id="chartLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4dbfa8;stop-opacity:0.8"/>
      <stop offset="50%" style="stop-color:#f0a500;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#f5c842;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0"/>
    </linearGradient>
    <radialGradient id="searchGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0"/>
    </radialGradient>
    <clipPath id="magClip">
      <circle cx="220" cy="160" r="95"/>
    </clipPath>
  </defs>

  <rect width="540" height="340" fill="url(#bgGrad)" rx="16"/>

  <!-- Magnifier ambient glow -->
  <circle cx="220" cy="160" r="130" fill="url(#searchGlow)"/>

  <!-- Chart area (full, under glass) -->
  <!-- Grid -->
  <line x1="60" y1="60" x2="60" y2="280" stroke="#2d3750" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="280" x2="480" y2="280" stroke="#2d3750" stroke-width="0.8" opacity="0.4"/>
  <line x1="60" y1="200" x2="480" y2="200" stroke="#2d3750" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="60" y1="140" x2="480" y2="140" stroke="#2d3750" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>
  <line x1="60" y1="80" x2="480" y2="80" stroke="#2d3750" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>

  <!-- Chart fill (area under line) -->
  <path d="M 60 260 L 100 250 L 150 240 L 200 232 L 240 218 L 280 198 L 320 170 L 360 138 L 400 105 L 440 80 L 480 60 L 480 280 L 60 280 Z" fill="url(#chartFill)"/>

  <!-- Chart line -->
  <polyline points="60,260 100,250 150,240 200,232 240,218 280,198 320,170 360,138 400,105 440,80 480,60"
    fill="none" stroke="url(#chartLine)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Data points on line -->
  <circle cx="160" cy="238" r="4" fill="#4dbfa8" opacity="0.6"/>
  <circle cx="240" cy="218" r="4" fill="#6fcfed" opacity="0.7"/>
  <circle cx="320" cy="170" r="4" fill="#f0a500" opacity="0.8"/>
  <circle cx="400" cy="105" r="5" fill="#f0a500" opacity="0.9" filter="url(#glow)"/>
  <circle cx="480" cy="60" r="6" fill="#f5c842" filter="url(#glow)"/>

  <!-- === MAGNIFYING GLASS === -->
  <!-- Outer glow ring -->
  <circle cx="220" cy="160" r="105" fill="none" stroke="#f0a500" stroke-width="0.5" opacity="0.2"/>

  <!-- Glass body - slightly lighter tinted overlay -->
  <circle cx="220" cy="160" r="95" fill="#0d1117" opacity="0.18"/>

  <!-- Magnifier inner content (slightly zoomed/brighter version of chart) -->
  <!-- Re-draw chart section under lens, brightened -->
  <g clip-path="url(#magClip)">
    <!-- Brighter grid inside lens -->
    <line x1="125" y1="60" x2="315" y2="60" stroke="#3a4a6a" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="125" y1="140" x2="315" y2="140" stroke="#3a4a6a" stroke-width="0.8" stroke-dasharray="3,3"/>
    <line x1="125" y1="200" x2="315" y2="200" stroke="#3a4a6a" stroke-width="0.8" stroke-dasharray="3,3"/>

    <!-- Zoomed chart line (slightly different coords to simulate zoom) -->
    <polyline points="125,252 155,240 185,226 215,210 245,190 275,162 305,128"
      fill="none" stroke="url(#chartLine)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

    <!-- Zoomed data dots inside lens - brighter -->
    <circle cx="185" cy="226" r="5" fill="#4dbfa8" filter="url(#glow)"/>
    <circle cx="245" cy="190" r="5" fill="#6cb4e8" filter="url(#glow)"/>
    <circle cx="305" cy="128" r="6" fill="#f0a500" filter="url(#glow)"/>

    <!-- Small vertical line at focal point -->
    <line x1="245" y1="100" x2="245" y2="280" stroke="#f0a500" stroke-width="1" stroke-dasharray="3,3" opacity="0.3"/>
  </g>

  <!-- Magnifier rim -->
  <circle cx="220" cy="160" r="95" fill="none" stroke="#f0a500" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <circle cx="220" cy="160" r="95" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- Lens highlight arc -->
  <path d="M 152 104 A 95 95 0 0 1 288 104" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.12" stroke-linecap="round"/>

  <!-- Magnifier handle -->
  <line x1="296" y1="236" x2="368" y2="308" stroke="#f0a500" stroke-width="14" stroke-linecap="round" opacity="0.8" filter="url(#glow)"/>
  <line x1="296" y1="236" x2="368" y2="308" stroke="#f5c842" stroke-width="6" stroke-linecap="round" opacity="0.9"/>
  <!-- Handle grip marks -->
  <line x1="318" y1="258" x2="310" y2="266" stroke="#1e2840" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="330" y1="270" x2="322" y2="278" stroke="#1e2840" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="342" y1="282" x2="334" y2="290" stroke="#1e2840" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Peak value marker outside glass (right side) -->
  <g transform="translate(460, 46)">
    <rect x="-28" y="-10" width="56" height="20" rx="10" fill="#1e2840" stroke="#f0a500" stroke-width="1.5" filter="url(#glow)"/>
    <circle cx="-18" cy="0" r="4" fill="#f0a500"/>
    <rect x="-8" y="-3" width="30" height="6" rx="3" fill="#f0a500" opacity="0.4"/>
  </g>
  <!-- Arrow to peak -->
  <line x1="436" y1="52" x2="444" y2="54" stroke="#f0a500" stroke-width="1" opacity="0.4"/>

  <!-- Growth arrow indicator -->
  <g transform="translate(470, 160)">
    <circle cx="0" cy="0" r="16" fill="#1e2840" stroke="#4dbfa8" stroke-width="1.5"/>
    <polyline points="-4,4 0,-5 4,4" fill="#4dbfa8" opacity="0.8"/>
    <line x1="0" y1="-5" x2="0" y2="6" stroke="#4dbfa8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Floating sparkle stars -->
  <g filter="url(#glow)" opacity="0.7">
    <circle cx="90" cy="100" r="2" fill="#f0a500"/>
    <circle cx="440" cy="230" r="2" fill="#4dbfa8"/>
    <circle cx="480" cy="150" r="1.5" fill="#f5c842"/>
    <circle cx="70" cy="200" r="1.5" fill="#6cb4e8"/>
  </g>
</svg>
