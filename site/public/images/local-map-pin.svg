<svg viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="pinGlow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="340" fill="url(#bgGrad)" rx="16"/>
  <!-- Map grid lines -->
  <g stroke="#2d3750" stroke-width="0.8" opacity="0.3">
    <line x1="40" y1="80" x2="360" y2="80"/><line x1="40" y1="140" x2="360" y2="140"/>
    <line x1="40" y1="200" x2="360" y2="200"/><line x1="40" y1="260" x2="360" y2="260"/>
    <line x1="80" y1="40" x2="80" y2="300"/><line x1="160" y1="40" x2="160" y2="300"/>
    <line x1="240" y1="40" x2="240" y2="300"/><line x1="320" y1="40" x2="320" y2="300"/>
  </g>
  <!-- Road lines -->
  <line x1="40" y1="170" x2="360" y2="170" stroke="#2d3750" stroke-width="4" opacity="0.5"/>
  <line x1="200" y1="40" x2="200" y2="300" stroke="#2d3750" stroke-width="4" opacity="0.5"/>
  <!-- Road dashes -->
  <line x1="40" y1="170" x2="360" y2="170" stroke="#4a5568" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>
  <line x1="200" y1="40" x2="200" y2="300" stroke="#4a5568" stroke-width="1" stroke-dasharray="8,6" opacity="0.5"/>
  <!-- Building blocks -->
  <rect x="90" y="95" width="40" height="35" rx="3" fill="#1e2840" stroke="#2d3750" stroke-width="1"/>
  <rect x="96" y="102" width="8" height="6" rx="1" fill="#4dbfa8" opacity="0.3"/>
  <rect x="110" y="102" width="8" height="6" rx="1" fill="#4dbfa8" opacity="0.3"/>
  <rect x="96" y="114" width="8" height="6" rx="1" fill="#4dbfa8" opacity="0.3"/>
  <rect x="250" y="190" width="50" height="40" rx="3" fill="#1e2840" stroke="#2d3750" stroke-width="1"/>
  <rect x="258" y="198" width="10" height="8" rx="1" fill="#6cb4e8" opacity="0.3"/>
  <rect x="274" y="198" width="10" height="8" rx="1" fill="#6cb4e8" opacity="0.3"/>
  <rect x="258" y="212" width="10" height="8" rx="1" fill="#6cb4e8" opacity="0.3"/>
  <!-- Main pin with glow -->
  <circle cx="200" cy="140" r="50" fill="url(#pinGlow)"/>
  <path d="M 200 90 C 220 90, 235 105, 235 125 C 235 145, 200 180, 200 180 C 200 180, 165 145, 165 125 C 165 105, 180 90, 200 90 Z" fill="#f0a500" opacity="0.9" filter="url(#glow)"/>
  <circle cx="200" cy="122" r="16" fill="#1e2840"/>
  <circle cx="200" cy="122" r="8" fill="#f0a500" opacity="0.6"/>
  <!-- Star rating badge -->
  <g transform="translate(200,230)">
    <rect x="-40" y="-14" width="80" height="28" rx="14" fill="#1e2840" stroke="#f0a500" stroke-width="1.5"/>
    <polygon points="-20,-2 -18,4 -12,4 -17,8 -15,14 -20,10 -25,14 -23,8 -28,4 -22,4" fill="#f5c842" opacity="0.8" transform="scale(0.7) translate(3,-8)"/>
    <polygon points="0,-2 2,4 8,4 3,8 5,14 0,10 -5,14 -3,8 -8,4 -2,4" fill="#f5c842" opacity="0.8" transform="scale(0.7) translate(3,-8)"/>
    <polygon points="20,-2 22,4 28,4 23,8 25,14 20,10 15,14 17,8 12,4 18,4" fill="#f5c842" opacity="0.8" transform="scale(0.7) translate(3,-8)"/>
    <rect x="16" y="-3" width="18" height="6" rx="3" fill="#f0a500" opacity="0.4"/>
  </g>
  <!-- Secondary pins (smaller, muted) -->
  <g opacity="0.5">
    <path d="M 100 210 C 108 210, 114 216, 114 224 C 114 232, 100 246, 100 246 C 100 246, 86 232, 86 224 C 86 216, 92 210, 100 210 Z" fill="#4dbfa8" opacity="0.6"/>
    <circle cx="100" cy="222" r="5" fill="#1e2840"/>
  </g>
  <g opacity="0.4">
    <path d="M 310 100 C 316 100, 320 104, 320 110 C 320 116, 310 126, 310 126 C 310 126, 300 116, 300 110 C 300 104, 304 100, 310 100 Z" fill="#6cb4e8" opacity="0.6"/>
    <circle cx="310" cy="108" r="4" fill="#1e2840"/>
  </g>
  <!-- Sparkles -->
  <circle cx="60" cy="60" r="2" fill="#f0a500" opacity="0.4" filter="url(#glow)"/>
  <circle cx="340" cy="270" r="1.5" fill="#4dbfa8" opacity="0.5" filter="url(#glow)"/>
</svg>
