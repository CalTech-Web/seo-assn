<svg viewBox="0 0 540 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0a500"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
    <radialGradient id="nodeGlow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="nodeGlow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#4dbfa8;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#4dbfa8;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="540" height="300" fill="url(#bgGrad)" rx="16"/>

  <!-- Connection lines between nodes -->
  <!-- Center to left nodes -->
  <line x1="270" y1="150" x2="100" y2="80" stroke="#f0a500" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="270" y1="150" x2="80" y2="170" stroke="#4dbfa8" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="270" y1="150" x2="110" y2="248" stroke="#6cb4e8" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <!-- Center to right nodes -->
  <line x1="270" y1="150" x2="440" y2="70" stroke="#f0a500" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="270" y1="150" x2="460" y2="170" stroke="#e879a0" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <line x1="270" y1="150" x2="420" y2="250" stroke="#4dbfa8" stroke-width="1" stroke-dasharray="5,4" opacity="0.3"/>
  <!-- Horizontal cross connections -->
  <line x1="100" y1="80" x2="440" y2="70" stroke="#2d3750" stroke-width="0.8" opacity="0.2"/>
  <line x1="80" y1="170" x2="460" y2="170" stroke="#2d3750" stroke-width="0.8" opacity="0.2"/>
  <line x1="110" y1="248" x2="420" y2="250" stroke="#2d3750" stroke-width="0.8" opacity="0.2"/>

  <!-- Outer ring nodes -->

  <!-- Node top-left: No Pushy Sales -->
  <circle cx="100" cy="80" r="36" fill="url(#nodeGlow2)"/>
  <circle cx="100" cy="80" r="28" fill="#1a2133" stroke="#4dbfa8" stroke-width="2"/>
  <!-- Shield icon -->
  <path d="M 100 62 L 116 68 L 116 80 Q 116 92 100 98 Q 84 92 84 80 L 84 68 Z" fill="none" stroke="#4dbfa8" stroke-width="1.5"/>
  <polyline points="93,80 98,85 108,73" fill="none" stroke="#4dbfa8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node mid-left: Transparent Pricing -->
  <circle cx="68" cy="170" r="36" fill="#1e2840" opacity="0.4"/>
  <circle cx="68" cy="170" r="28" fill="#1a2133" stroke="#f0a500" stroke-width="2"/>
  <!-- Price tag icon -->
  <polygon points="68,150 80,156 80,176 68,184 56,176 56,156" fill="none" stroke="#f0a500" stroke-width="1.5"/>
  <circle cx="74" cy="159" r="3" fill="none" stroke="#f0a500" stroke-width="1.5"/>
  <line x1="60" y1="168" x2="76" y2="168" stroke="#f0a500" stroke-width="1" opacity="0.5"/>

  <!-- Node bottom-left: Education First -->
  <circle cx="106" cy="250" r="36" fill="#1e2840" opacity="0.4"/>
  <circle cx="106" cy="250" r="28" fill="#1a2133" stroke="#6cb4e8" stroke-width="2"/>
  <!-- Book/graduation icon -->
  <rect x="90" y="238" width="32" height="22" rx="3" fill="none" stroke="#6cb4e8" stroke-width="1.5"/>
  <line x1="106" y1="238" x2="106" y2="260" stroke="#6cb4e8" stroke-width="1" opacity="0.5"/>
  <path d="M 90 244 Q 98 240 106 244" fill="none" stroke="#6cb4e8" stroke-width="1" opacity="0.7"/>
  <path d="M 106 244 Q 114 240 122 244" fill="none" stroke="#6cb4e8" stroke-width="1" opacity="0.7"/>

  <!-- Node top-right: Expert Team -->
  <circle cx="440" cy="70" r="36" fill="url(#nodeGlow1)"/>
  <circle cx="440" cy="70" r="28" fill="#1a2133" stroke="#f0a500" stroke-width="2" filter="url(#glow)"/>
  <!-- Star/award icon -->
  <polygon points="440,50 444,64 458,64 447,72 451,86 440,78 429,86 433,72 422,64 436,64" fill="#f0a500" opacity="0.8"/>

  <!-- Node mid-right: Real Results -->
  <circle cx="472" cy="168" r="36" fill="#1e2840" opacity="0.4"/>
  <circle cx="472" cy="168" r="28" fill="#1a2133" stroke="#e879a0" stroke-width="2"/>
  <!-- Chart upward icon -->
  <polyline points="456,184 464,172 472,178 480,162 488,156" fill="none" stroke="#e879a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="484,152 488,156 484,160" fill="none" stroke="#e879a0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Node bottom-right: Free Tools -->
  <circle cx="432" cy="252" r="36" fill="#1e2840" opacity="0.4"/>
  <circle cx="432" cy="252" r="28" fill="#1a2133" stroke="#4dbfa8" stroke-width="2"/>
  <!-- Wrench/tool icon -->
  <rect x="420" y="238" width="24" height="28" rx="5" fill="none" stroke="#4dbfa8" stroke-width="1.5"/>
  <line x1="428" y1="248" x2="444" y2="248" stroke="#4dbfa8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="428" y1="256" x2="440" y2="256" stroke="#4dbfa8" stroke-width="1" stroke-linecap="round" opacity="0.6"/>
  <rect x="428" y="234" width="8" height="8" rx="2" fill="#4dbfa8" opacity="0.5"/>

  <!-- CENTER HUB - Main brand node -->
  <circle cx="270" cy="150" r="55" fill="#f0a500" opacity="0.05"/>
  <circle cx="270" cy="150" r="44" fill="#1a2133" stroke="#f0a500" stroke-width="3" filter="url(#glow)"/>
  <circle cx="270" cy="150" r="38" fill="none" stroke="#f0a500" stroke-width="0.8" opacity="0.3"/>

  <!-- Center magnifier + gear hybrid icon -->
  <!-- Gear outer -->
  <circle cx="270" cy="150" r="18" fill="none" stroke="#f0a500" stroke-width="2" opacity="0.6"/>
  <!-- Gear teeth (8 teeth) -->
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(0,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(45,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(90,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(135,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(180,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(225,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(270,270,150)"/>
  <rect x="266" y="128" width="8" height="6" rx="1" fill="#f0a500" opacity="0.7" transform="rotate(315,270,150)"/>
  <!-- Center circle -->
  <circle cx="270" cy="150" r="10" fill="#f0a500" opacity="0.9" filter="url(#glow)"/>
  <circle cx="270" cy="150" r="5" fill="#1a2133"/>

  <!-- Pulse rings -->
  <circle cx="270" cy="150" r="60" fill="none" stroke="#f0a500" stroke-width="0.5" opacity="0.15"/>
  <circle cx="270" cy="150" r="75" fill="none" stroke="#f0a500" stroke-width="0.5" opacity="0.08"/>
</svg>
