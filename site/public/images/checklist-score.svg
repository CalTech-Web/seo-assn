<svg viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4dbfa8"/>
      <stop offset="60%" style="stop-color:#f0a500"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
  </defs>
  <rect width="400" height="340" fill="url(#bgGrad)" rx="16"/>
  <!-- Score ring -->
  <circle cx="200" cy="130" r="80" fill="none" stroke="#1e2840" stroke-width="12"/>
  <circle cx="200" cy="130" r="80" fill="none" stroke="url(#scoreGrad)" stroke-width="12" stroke-dasharray="377 503" stroke-linecap="round" transform="rotate(-90,200,130)" filter="url(#glow)"/>
  <circle cx="200" cy="130" r="65" fill="#1a2133" stroke="#2d3750" stroke-width="1"/>
  <!-- Score text -->
  <text x="200" y="122" text-anchor="middle" font-size="36" fill="#f0a500" font-family="sans-serif" font-weight="bold" filter="url(#glow)">75</text>
  <text x="200" y="148" text-anchor="middle" font-size="11" fill="#4a5568" font-family="sans-serif">/100</text>
  <!-- Category bars below -->
  <g transform="translate(80,240)">
    <rect x="0" y="0" width="240" height="8" rx="4" fill="#1e2840"/>
    <rect x="0" y="0" width="192" height="8" rx="4" fill="#4dbfa8" opacity="0.7"/>
    <rect x="0" y="0" width="6" height="8" rx="3" fill="#4dbfa8" opacity="0.3"/>
    <text x="248" y="8" font-size="9" fill="#4a5568" font-family="sans-serif">80%</text>
  </g>
  <g transform="translate(80,258)">
    <rect x="0" y="0" width="240" height="8" rx="4" fill="#1e2840"/>
    <rect x="0" y="0" width="168" height="8" rx="4" fill="#f0a500" opacity="0.7"/>
    <text x="248" y="8" font-size="9" fill="#4a5568" font-family="sans-serif">70%</text>
  </g>
  <g transform="translate(80,276)">
    <rect x="0" y="0" width="240" height="8" rx="4" fill="#1e2840"/>
    <rect x="0" y="0" width="144" height="8" rx="4" fill="#6cb4e8" opacity="0.7"/>
    <text x="248" y="8" font-size="9" fill="#4a5568" font-family="sans-serif">60%</text>
  </g>
  <g transform="translate(80,294)">
    <rect x="0" y="0" width="240" height="8" rx="4" fill="#1e2840"/>
    <rect x="0" y="0" width="192" height="8" rx="4" fill="#e879a0" opacity="0.6"/>
    <text x="248" y="8" font-size="9" fill="#4a5568" font-family="sans-serif">80%</text>
  </g>
  <!-- Floating check badge -->
  <g transform="translate(310,80)">
    <circle cx="0" cy="0" r="18" fill="#1e2840" stroke="#4dbfa8" stroke-width="2" filter="url(#glow)"/>
    <polyline points="-7,-1 -2,5 8,-6" fill="none" stroke="#4dbfa8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <!-- Sparkles -->
  <circle cx="70" cy="100" r="2" fill="#f0a500" opacity="0.4" filter="url(#glow)"/>
  <circle cx="340" cy="200" r="1.5" fill="#4dbfa8" opacity="0.5" filter="url(#glow)"/>
</svg>
