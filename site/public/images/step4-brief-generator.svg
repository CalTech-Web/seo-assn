<svg viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="docGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e2840"/>
      <stop offset="100%" style="stop-color:#161f30"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f0a500"/>
      <stop offset="100%" style="stop-color:#f5c842"/>
    </linearGradient>
    <radialGradient id="glowBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f0a500;stop-opacity:0.07"/>
      <stop offset="100%" style="stop-color:#f0a500;stop-opacity:0"/>
    </radialGradient>
  </defs>

  <rect width="400" height="340" fill="url(#bgGrad)" rx="16"/>

  <!-- Glow behind document -->
  <ellipse cx="200" cy="170" rx="120" ry="130" fill="url(#glowBg)"/>

  <!-- Shadow document (behind) -->
  <rect x="134" y="44" width="152" height="200" rx="10" fill="#0d1117" opacity="0.6"/>

  <!-- Main Document -->
  <rect x="124" y="38" width="152" height="200" rx="10" fill="url(#docGrad)" stroke="#2d3750" stroke-width="1.5"/>

  <!-- Document fold corner -->
  <path d="M 256 38 L 276 58 L 256 58 Z" fill="#0d1117" opacity="0.8"/>
  <path d="M 256 38 L 276 58 L 256 58" fill="none" stroke="#2d3750" stroke-width="1"/>

  <!-- Top gold accent bar -->
  <rect x="124" y="38" width="152" height="5" rx="2" fill="url(#goldGrad)" opacity="0.8"/>

  <!-- Document content -->
  <!-- Header line -->
  <rect x="136" y="52" width="100" height="7" rx="3.5" fill="#f0a500" opacity="0.7" filter="url(#glow)"/>
  <rect x="136" y="52" width="20" height="7" rx="3.5" fill="#f0a500" opacity="0.3"/>

  <!-- Divider -->
  <line x1="136" y1="68" x2="264" y2="68" stroke="#2d3750" stroke-width="1"/>

  <!-- Section with mini chart -->
  <rect x="136" y="76" width="60" height="5" rx="2.5" fill="#4a5568"/>

  <!-- Mini bar chart -->
  <rect x="136" y="90" width="10" height="30" rx="2" fill="#4dbfa8" opacity="0.5"/>
  <rect x="150" y="78" width="10" height="42" rx="2" fill="#f0a500" opacity="0.8"/>
  <rect x="164" y="85" width="10" height="35" rx="2" fill="#6cb4e8" opacity="0.5"/>
  <rect x="178" y="95" width="10" height="25" rx="2" fill="#e879a0" opacity="0.5"/>

  <!-- Right column text lines -->
  <rect x="200" y="82" width="52" height="5" rx="2.5" fill="#4a5568"/>
  <rect x="200" y="92" width="44" height="5" rx="2.5" fill="#4a5568"/>
  <rect x="200" y="102" width="48" height="5" rx="2.5" fill="#4a5568"/>
  <rect x="200" y="112" width="36" height="5" rx="2.5" fill="#4a5568"/>

  <!-- Divider -->
  <line x1="136" y1="128" x2="264" y2="128" stroke="#2d3750" stroke-width="1"/>

  <!-- Text lines section 2 -->
  <rect x="136" y="136" width="112" height="5" rx="2.5" fill="#4a5568"/>
  <rect x="136" y="148" width="96" height="5" rx="2.5" fill="#4a5568"/>
  <rect x="136" y="160" width="108" height="5" rx="2.5" fill="#4a5568"/>

  <!-- Divider -->
  <line x1="136" y1="174" x2="264" y2="174" stroke="#2d3750" stroke-width="1"/>

  <!-- Progress/completion section -->
  <rect x="136" y="182" width="112" height="6" rx="3" fill="#1a2133"/>
  <rect x="136" y="182" width="80" height="6" rx="3" fill="url(#goldGrad)" filter="url(#glow)"/>

  <rect x="136" y="196" width="112" height="6" rx="3" fill="#1a2133"/>
  <rect x="136" y="196" width="56" height="6" rx="3" fill="#4dbfa8" opacity="0.7"/>

  <rect x="136" y="210" width="112" height="6" rx="3" fill="#1a2133"/>
  <rect x="136" y="210" width="96" height="6" rx="3" fill="#6cb4e8" opacity="0.7"/>

  <!-- Download arrow + decorative -->
  <g transform="translate(200, 268)" filter="url(#softGlow)">
    <!-- Arrow down into document symbol -->
    <circle cx="0" cy="0" r="22" fill="#1e2840" stroke="#f0a500" stroke-width="2"/>
    <line x1="0" y1="-10" x2="0" y2="8" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round"/>
    <polyline points="-7,2 0,10 7,2" fill="none" stroke="#f0a500" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="-10" y1="14" x2="10" y2="14" stroke="#f0a500" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Floating data chips flying from document -->
  <!-- Chip 1 -->
  <g transform="translate(306, 90)">
    <rect x="-24" y="-12" width="48" height="24" rx="8" fill="#1e2840" stroke="#4dbfa8" stroke-width="1.5" opacity="0.9"/>
    <rect x="-18" y="-5" width="12" height="10" rx="3" fill="#4dbfa8" opacity="0.5"/>
    <rect x="-2" y="-5" width="22" height="4" rx="2" fill="#2d3750"/>
    <rect x="-2" y="1" width="16" height="4" rx="2" fill="#2d3750"/>
  </g>

  <!-- Chip 2 -->
  <g transform="translate(316, 150)">
    <rect x="-24" y="-12" width="48" height="24" rx="8" fill="#1e2840" stroke="#f0a500" stroke-width="1.5" opacity="0.9" filter="url(#glow)"/>
    <rect x="-18" y="-5" width="12" height="10" rx="3" fill="#f0a500" opacity="0.6"/>
    <rect x="-2" y="-5" width="22" height="4" rx="2" fill="#2d3750"/>
    <rect x="-2" y="1" width="16" height="4" rx="2" fill="#2d3750"/>
  </g>

  <!-- Chip 3 -->
  <g transform="translate(80, 110)">
    <rect x="-24" y="-12" width="48" height="24" rx="8" fill="#1e2840" stroke="#e879a0" stroke-width="1.5" opacity="0.8"/>
    <rect x="-18" y="-5" width="12" height="10" rx="3" fill="#e879a0" opacity="0.5"/>
    <rect x="-2" y="-5" width="22" height="4" rx="2" fill="#2d3750"/>
    <rect x="-2" y="1" width="16" height="4" rx="2" fill="#2d3750"/>
  </g>

  <!-- Connection lines from doc to chips -->
  <line x1="276" y1="100" x2="282" y2="95" stroke="#4dbfa8" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="276" y1="148" x2="292" y2="150" stroke="#f0a500" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="124" y1="120" x2="104" y2="115" stroke="#e879a0" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Stars/sparkles -->
  <circle cx="90" cy="45" r="2" fill="#f0a500" opacity="0.5"/>
  <circle cx="318" cy="58" r="1.5" fill="#f5c842" opacity="0.4"/>
  <circle cx="340" cy="220" r="2" fill="#4dbfa8" opacity="0.3"/>
  <circle cx="60" cy="200" r="1.5" fill="#e879a0" opacity="0.4"/>
</svg>
