<svg viewBox="0 0 400 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#161b2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4dbfa8"/>
      <stop offset="100%" style="stop-color:#f0a500"/>
    </linearGradient>
  </defs>
  <rect width="400" height="340" fill="url(#bgGrad)" rx="16"/>
  <!-- Timeline horizontal line -->
  <line x1="40" y1="280" x2="360" y2="280" stroke="#2d3750" stroke-width="2"/>
  <!-- Month markers -->
  <g font-size="9" fill="#4a5568" font-family="sans-serif" text-anchor="middle">
    <line x1="70" y1="275" x2="70" y2="285" stroke="#2d3750" stroke-width="1.5"/>
    <text x="70" y="300">M1</text>
    <line x1="140" y1="275" x2="140" y2="285" stroke="#2d3750" stroke-width="1.5"/>
    <text x="140" y="300">M3</text>
    <line x1="210" y1="275" x2="210" y2="285" stroke="#2d3750" stroke-width="1.5"/>
    <text x="210" y="300">M6</text>
    <line x1="280" y1="275" x2="280" y2="285" stroke="#2d3750" stroke-width="1.5"/>
    <text x="280" y="300">M9</text>
    <line x1="350" y1="275" x2="350" y2="285" stroke="#2d3750" stroke-width="1.5"/>
    <text x="350" y="300">M12</text>
  </g>
  <!-- Growth curve -->
  <path d="M 70 260 C 100 258, 120 250, 140 240 C 160 230, 180 210, 210 180 C 240 150, 260 120, 280 95 C 300 70, 330 55, 350 45" fill="none" stroke="url(#lineGrad)" stroke-width="3" stroke-linecap="round"/>
  <!-- Phase cards -->
  <g transform="translate(70,230)">
    <rect x="-24" y="-20" width="48" height="24" rx="6" fill="#1e2840" stroke="#4dbfa8" stroke-width="1.5"/>
    <rect x="-14" y="-12" width="28" height="5" rx="2.5" fill="#4dbfa8" opacity="0.5"/>
    <circle cx="0" cy="0" r="4" fill="#4dbfa8" filter="url(#glow)"/>
  </g>
  <g transform="translate(210,148)">
    <rect x="-28" y="-20" width="56" height="24" rx="6" fill="#1e2840" stroke="#6cb4e8" stroke-width="1.5"/>
    <rect x="-18" y="-12" width="36" height="5" rx="2.5" fill="#6cb4e8" opacity="0.5"/>
    <circle cx="0" cy="0" r="5" fill="#6cb4e8" filter="url(#glow)"/>
  </g>
  <g transform="translate(350,20)">
    <rect x="-30" y="-14" width="60" height="28" rx="8" fill="#1e2840" stroke="#f0a500" stroke-width="2" filter="url(#glow)"/>
    <rect x="-18" y="-6" width="36" height="5" rx="2.5" fill="#f0a500" opacity="0.6"/>
    <rect x="-18" y="3" width="24" height="4" rx="2" fill="#f5c842" opacity="0.3"/>
  </g>
  <!-- Up arrow at end -->
  <g transform="translate(350,45)">
    <circle cx="0" cy="0" r="5" fill="#f0a500" filter="url(#glow)"/>
  </g>
  <!-- Clock icon floating -->
  <g transform="translate(60,60)">
    <circle cx="0" cy="0" r="22" fill="#1e2840" stroke="#f0a500" stroke-width="1.5" opacity="0.8"/>
    <circle cx="0" cy="0" r="16" fill="none" stroke="#f0a500" stroke-width="1" opacity="0.4"/>
    <line x1="0" y1="0" x2="0" y2="-10" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="7" y2="3" stroke="#f0a500" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2" fill="#f0a500"/>
  </g>
  <!-- Sparkles -->
  <circle cx="180" cy="50" r="1.5" fill="#4dbfa8" opacity="0.5" filter="url(#glow)"/>
  <circle cx="320" cy="130" r="2" fill="#f5c842" opacity="0.4" filter="url(#glow)"/>
</svg>
