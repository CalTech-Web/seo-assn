<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Magnifying glass circle -->
  <circle cx="13.5" cy="13.5" r="7" stroke="#f59e0b" stroke-width="2.25" fill="none"/>
  <!-- Magnifying glass handle -->
  <line x1="18.75" y1="18.75" x2="26" y2="26" stroke="#f59e0b" stroke-width="2.25" stroke-linecap="round"/>
  <!-- Rising bars -->
  <rect x="9" y="15" width="2.5" height="3" rx="0.5" fill="white"/>
  <rect x="12.5" y="12.5" width="2.5" height="5.5" rx="0.5" fill="white"/>
  <rect x="16" y="10" width="2.5" height="8" rx="0.5" fill="white"/>
</svg>
